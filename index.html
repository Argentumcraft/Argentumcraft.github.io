<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Argentumcraft</title>
  <!-- Fuente pixelada -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Press+Start+2P&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .top-bar {
      width: 100%;
      background-color: #222;
      padding: 20px 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.7);
    }

    h1 {
      font-size: clamp(1.2rem, 5vw, 2.2rem);
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 #555;
      margin-bottom: 15px;
      word-break: break-word;
    }

    .nav-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .nav-bar a {
      color: #fff;
      text-decoration: none;
      background-color: #444;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.7rem;
      transition: background-color 0.3s, transform 0.2s;
      white-space: nowrap;
      border: 1px solid #666;
    }

    .nav-bar a:hover,
    .nav-bar a:active {
      background-color: #8b5e3c;
      transform: scale(1.05);
      border-color: #c0a080;
    }

    /* ===== Adaptación para celulares ===== */
    @media (max-width: 600px) {
      .top-bar {
        padding: 18px 10px;
      }

      .nav-bar {
        flex-direction: column;
        gap: 10px;
      }

      .nav-bar a {
        display: block;
        width: 80%;
        max-width: 250px;
        margin: 0 auto;
        font-size: 0.75rem;
        padding: 12px 10px;
        text-align: center;
      }
    }

    /* Para pantallas muy pequeñas (ej: 360px) */
    @media (max-width: 380px) {
      h1 {
        font-size: 1rem;
      }

      .nav-bar a {
        font-size: 0.65rem;
        padding: 10px 6px;
        width: 90%;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>Argentumcraft</h1>
    <nav class="nav-bar">
      <a href="index.html">Inicio</a>
      <!-- Enlace de Tutoriales eliminado como pediste -->
      <a href="capturas.html">Capturas de pantalla</a>
      <a href="donaciones.html">Donaciones</a>
    </nav>
  </div>
  <!-- Aquí puedes añadir más contenido de la página -->
</body>
</html>
