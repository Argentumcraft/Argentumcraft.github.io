<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Donaciones - Argentumcraft</title>
  <!-- Fuente pixelada -->
  <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Press+Start+2P&display=swap">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      color: #fff;
      font-family: 'Press Start 2P', cursive;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ===== Barra superior común ===== */
    .top-bar {
      width: 100%;
      background-color: #222;
      padding: 20px 15px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.7);
    }

    h1 {
      font-size: clamp(1.2rem, 5vw, 2.2rem);
      letter-spacing: 1px;
      text-shadow: 2px 2px 0 #555;
      margin-bottom: 15px;
      word-break: break-word;
    }

    .nav-bar {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
      gap: 12px;
    }

    .nav-bar a {
      color: #fff;
      text-decoration: none;
      background-color: #444;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 0.7rem;
      transition: background-color 0.3s, transform 0.2s;
      white-space: nowrap;
      border: 1px solid #666;
    }

    .nav-bar a:hover,
    .nav-bar a:active {
      background-color: #8b5e3c;
      transform: scale(1.05);
      border-color: #c0a080;
    }

    /* ===== Contenido ===== */
    .content {
      width: 90%;
      max-width: 700px;
      margin: 30px auto;
      padding: 30px 20px;
      background-color: #222;
      border-radius: 12px;
      text-align: center;
    }

    h2 {
      font-size: clamp(1rem, 4vw, 1.8rem);
      margin-bottom: 20px;
      color: #ddd;
      text-shadow: 1px 1px 0 #444;
    }

    .info-text {
      font-size: 0.7rem;
      line-height: 2;
      color: #ccc;
      margin-bottom: 30px;
    }

    .info-text strong {
      color: #ffd966;
    }

    .donate-button {
      display: inline-block;
      padding: 16px 30px;
      font-family: 'Press Start 2P', cursive;
      font-size: 0.8rem;
      background-color: #4CAF50;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      transition: background-color 0.3s, transform 0.2s;
      text-transform: uppercase;
      border: 2px solid #6ab04c;
      box-shadow: 0 4px 0 #2e7d32;
    }

    .donate-button:hover {
      background-color: #45a049;
      transform: translateY(-2px);
      box-shadow: 0 6px 0 #2e7d32;
    }

    .donate-button:active {
      transform: translateY(2px);
      box-shadow: 0 2px 0 #2e7d32;
    }

    /* ===== Adaptaciones para celulares ===== */
    @media (max-width: 600px) {
      .top-bar {
        padding: 18px 10px;
      }

      .nav-bar {
        flex-direction: column;
        gap: 10px;
      }

      .nav-bar a {
        display: block;
        width: 80%;
        max-width: 250px;
        margin: 0 auto;
        font-size: 0.75rem;
        padding: 12px 10px;
        text-align: center;
      }

      .content {
        width: 95%;
        margin: 20px auto;
        padding: 20px 15px;
      }

      .donate-button {
        font-size: 0.75rem;
        padding: 14px 20px;
        width: 100%;
        max-width: 300px;
      }
    }

    @media (max-width: 380px) {
      h1 {
        font-size: 1rem;
      }

      .nav-bar a {
        font-size: 0.65rem;
        padding: 10px 6px;
        width: 90%;
      }

      .info-text {
        font-size: 0.6rem;
      }

      .donate-button {
        font-size: 0.7rem;
        padding: 12px 15px;
      }
    }
  </style>
</head>
<body>
  <div class="top-bar">
    <h1>Argentumcraft</h1>
    <nav class="nav-bar">
      <a href="index.html">Inicio</a>
      <a href="capturas.html">Capturas de pantalla</a>
      <a href="donaciones.html">Donaciones</a>
    </nav>
  </div>

  <div class="content">
    <h2>Donaciones</h2>
    <p class="info-text">
      Apoya al servidor y recibe <strong>Argentum</strong>, la moneda del juego.<br>
      La conversión es simple: <strong>1 USD = 1 Argentum</strong>.<br>
      Puedes donar desde <strong>1 Argentum</strong> (1 USD) o la cantidad que desees.
    </p>
    <a href="https://www.paypal.me/maxicf" target="_blank" class="donate-button">Donar con PayPal</a>
  </div>
</body>
</html>
